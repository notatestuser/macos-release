name: macos-release (reusable)

# Reusable release pipeline for the team's macOS apps.
# Build step is supplied by the caller (different build systems); this workflow
# owns the stack-agnostic half: import cert -> sign -> notarize -> dmg -> publish.
#
# Caller example (.github/workflows/release.yml in an app repo):
#
#   on: { push: { tags: ['v*.*.*'] } }
#   permissions: { contents: write }
#   jobs:
#     release:
#       uses: notatestuser/macos-release/.github/workflows/release.yml@v1
#       with:
#         app-name: "My App"
#         team-id: "ABCDE12345"              # this caller's Apple Developer team id
#         build-command: "bash build.sh"     # must produce ${app-path}; reads $APP_VERSION/$APP_BUILD
#         app-path: "My App.app"
#         bundle-id: "com.example.myapp"
#         dmg-name: "My-App"
#       secrets: inherit
#
# SECRET SAFETY (callers may be public repos — Actions logs are public):
#   • Secrets are referenced ONLY via env: and read as $VARS — never inlined as
#     ${{ secrets.* }} in run: scripts, so they never appear in the printed command.
#   • No `set -x`. Decoded .p12/.p8 are written to files under RUNNER_TEMP, never printed.
#   • GitHub auto-masks all registered secret values; the temp-keychain password and
#     the notary IDs are additionally masked explicitly.
#   • Tag-push trigger only → fork/PR runs never receive secrets.
#   • Callers pin @v1, so a push to this repo's main cannot hijack their secrets.

on:
  workflow_call:
    inputs:
      app-name:      { required: true,  type: string }
      build-command: { required: true,  type: string }
      app-path:      { required: true,  type: string }
      bundle-id:     { required: true,  type: string }
      dmg-name:      { required: true,  type: string }
      entitlements:  { required: false, type: string, default: '' }
      runner:        { required: false, type: string, default: 'macos-26' }
      team-id:       { required: true,  type: string }   # each caller declares its own Apple team id
      prerelease:    { required: false, type: boolean, default: false }
    secrets:
      DEVID_CERT_P12_BASE64:    { required: true }
      DEVID_CERT_PASSWORD:      { required: true }
      NOTARY_API_KEY_P8_BASE64: { required: true }
      NOTARY_API_KEY_ID:        { required: true }
      NOTARY_API_ISSUER_ID:     { required: true }

jobs:
  release:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write   # create the GitHub Release + upload the dmg
    steps:
      - name: Checkout app repo (caller)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history for monotonic CFBundleVersion

      - name: Checkout release tooling
        uses: actions/checkout@v4
        with:
          repository: notatestuser/macos-release
          ref: v1
          path: .macos-release

      - name: Derive version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "build=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"
          echo "Releasing ${TAG} (build $(git rev-list --count HEAD))"

      - name: Build app
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
          APP_BUILD:   ${{ steps.ver.outputs.build }}
          BUNDLE_ID:   ${{ inputs.bundle-id }}
        run: ${{ inputs.build-command }}

      - name: Import Developer ID certificate (temporary keychain)
        env:
          P12_B64: ${{ secrets.DEVID_CERT_P12_BASE64 }}
          P12_PW:  ${{ secrets.DEVID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KCPW="$(openssl rand -base64 24)"; echo "::add-mask::$KCPW"
          security create-keychain -p "$KCPW" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KCPW" "$KEYCHAIN"
          echo "$P12_B64" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$P12_PW" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCPW" "$KEYCHAIN" >/dev/null
          # make the temp keychain searchable (prepend, keep existing)
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/[\" ]//g')
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "SIGN_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Sign, notarize, package DMG
        id: pkg
        env:
          APP_PATH:        ${{ inputs.app-path }}
          APP_NAME:        ${{ inputs.app-name }}
          DMG_BASENAME:    ${{ inputs.dmg-name }}
          VERSION:         ${{ steps.ver.outputs.version }}
          ENTITLEMENTS:    ${{ inputs.entitlements }}
          TEAM_ID:         ${{ inputs.team-id }}
          OUT_DIR:         ${{ runner.temp }}/dist
          NOTARY_KEY_ID:    ${{ secrets.NOTARY_API_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_API_ISSUER_ID }}
          NOTARY_KEY_B64:   ${{ secrets.NOTARY_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          # GitHub already auto-masks registered secrets; mask the notary IDs
          # explicitly too, in case a subtool (e.g. notarytool) echoes them.
          echo "::add-mask::$NOTARY_KEY_ID"
          echo "::add-mask::$NOTARY_ISSUER_ID"
          echo "$NOTARY_KEY_B64" | base64 -d > "$RUNNER_TEMP/AuthKey.p8"
          export NOTARY_KEY="$RUNNER_TEMP/AuthKey.p8"
          command -v create-dmg >/dev/null 2>&1 || brew install create-dmg
          bash .macos-release/scripts/sign-notarize-dmg.sh
          rm -f "$RUNNER_TEMP/AuthKey.p8"

      - name: Create GitHub Release + upload DMG
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          DMG="${{ runner.temp }}/dist/${{ inputs.dmg-name }}-v${{ steps.ver.outputs.version }}.dmg"
          # auto-mark pre-releases (any tag with a -suffix, e.g. v1.0.0-rc.1)
          case "$TAG" in *-*) PRERELEASE=true;; esac
          FLAGS=(--generate-notes --title "$TAG")
          [ "$PRERELEASE" = "true" ] && FLAGS+=(--prerelease)
          gh release create "$TAG" "$DMG" "${FLAGS[@]}"

      - name: Cleanup keychain
        if: always()
        run: |
          [ -n "${SIGN_KEYCHAIN:-}" ] && security delete-keychain "$SIGN_KEYCHAIN" || true
          rm -f "$RUNNER_TEMP/AuthKey.p8" "$RUNNER_TEMP/cert.p12" || true
